# Mosquitto MQTT Broker - Konfigurasi Demo

# Listener MQTT standar pada port 1883
listener 1883 0.0.0.0

# Listener WebSocket pada port 9001
listener 9001 0.0.0.0
protocol websockets

# Izinkan koneksi anonim (tanpa autentikasi) untuk keperluan demo
allow_anonymous true

# Logging ke stdout
log_type all
log_dest stdout

# Persistensi pesan
persistence true
persistence_location /mosquitto/data/
